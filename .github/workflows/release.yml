name: Release
run-name: Release
description: GitHub Action to manage the immutable/attestable release cycle of 0mniteck/.pki
on:
  workflow_dispatch:
    inputs:
      RUN_CHECK:
        required: true
        type: boolean
        default: true
      RUN_REF:
        required: true
        type: string
        description: 'State pinning for this runners ref'
  repository_dispatch:
    types:
      - Global_Fetch
  schedule:
    - cron: '0 0/6 * * *'
  push:
    paths:
      - 'registry/*'
      - 'index/index.*'
permissions: {}
concurrency:
  group: release-main
  cancel-in-progress: true
jobs:
  fetch-pki:
    if: ${{inputs.RUN_CHECK == false || inputs.RUN_REF == github.workflow_sha}}
    name: Fetch PKI
    permissions:
      id-token: write
      contents: write
    concurrency:
      group: release
    secrets:
      DOCKER: ${{secrets.DOCKER}}
    uses: 0mniteck/.pki/.github/workflows/fetch.yml@7e70a681b774f0f3cc7ba8989e621270bc54d12e # v0.0.247
  release-pki:
    name: Release PKI
    permissions:
      id-token: write
      contents: write
      attestations: write
    concurrency:
      group: release
    needs: fetch-pki
    uses: 0mniteck/.pki/.github/workflows/immutable.yml@a6bf143f6cac37e1d082187b77c9036e6865e64a # v0.0.288
  attested-rel:
    name: Attest PKI
    permissions:
      id-token: write
      contents: read
      attestations: read
    concurrency:
      group: release
    environment:
      name: release
    needs: release-pki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Git Fetch
        run: git fetch && git pull origin main && echo Fetched
      - name: Run gh attestation verify
        env:
          GH_TOKEN: ${{github.token}}
          SUMS: ${{needs.release-pki.outputs.SUMS}}
        run: |
          for I in .github/{actions/jekyll,workflows}/* registry/* index/index.* local.sh ; do
            gh attestation verify $I --repo 0mniteck/.pki --source-ref refs/heads/main \
              --signer-workflow 0mniteck/.pki/.github/workflows/immutable.yml --digest-alg sha512 \
              --predicate-type provenance || exit 1;
            echo "$I Attested"; done; echo Done checking provenance;
            for J in $(echo -en ${{env.SUMS}} | sed 's/\\//g'); do
            gh attestation verify $J --repo 0mniteck/.pki --source-ref refs/heads/main \
              --signer-workflow 0mniteck/.pki/.github/workflows/immutable.yml --digest-alg sha256 \
              --predicate-type release || exit 1;
            echo "$J Attested"; done; echo Done checking release;
  read-me:
    name: Publish readme.md
    permissions:
      id-token: write
      contents: write
    concurrency:
      group: release
    needs:
      - attested-rel
      - release-pki
    with:
      attested_url: ${{needs.release-pki.outputs.URL}}
    uses: 0mniteck/.pki/.github/workflows/read-me.yml@5f5a3f361400226fbf6698a3fd94e4238f35bf72 # v0.0.247
  gh-pages:
    name: Release Github Pages
    permissions: 
      id-token: write
      pages: write
      contents: read
    concurrency:
      group: release
    needs: read-me
    uses: 0mniteck/.pki/.github/workflows/gh-pages.yml@7d265b0ba9324017b4e315196a6483f3c59cffee # v0.0.247
