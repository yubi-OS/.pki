name: Release
run-name: Release
description: 'GitHub Action to manage the immutable/attestable release cycle of 0mniteck/.pki pinned at tag v0.0.279'
on:
  workflow_dispatch:
    inputs:
      RUN_REF:
        required: true
        type: string
        description: 'State pinning to the immutable signers ref'
  repository_dispatch:
    types:
      - Global_Fetch
  watch:
    types:
      - started
  schedule:
    - cron: '0 0/6 * * *'
      timezone: America/Los_Angeles
  push:
    paths:
      - 'registry/*'
      - 'index/index.*'
permissions: {}
concurrency:
  group: release-main
  cancel-in-progress: true
jobs:
  fetch-pki:
    name: Fetch PKI
    permissions:
      id-token: write
      contents: write
    concurrency:
      group: release
    secrets:
      DOCKER: ${{secrets.DOCKER}}
    uses: 0mniteck/.pki/.github/workflows/fetch.yml@ed973f249bf28fe9dd99faf1a26bb6ffa4d26b39 # v0.0.279
  release-pki:
    name: Release PKI
    permissions:
      id-token: write
      contents: write
      attestations: write
    concurrency:
      group: release
    needs: fetch-pki
    uses: 0mniteck/.pki/.github/workflows/immutable.yml@6329394417460630b845ac97a38efd6d1167a3c9 # v0.0.279
  attested-rel:
    name: Attest PKI
    permissions:
      id-token: write
      contents: read
      attestations: read
    concurrency:
      group: release
    environment:
      name: release
    needs: release-pki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Git Fetch
        id: git_fetch
        run: |
          git fetch && git pull origin ${{github.ref_name}} && echo Fetched
          echo "TAG=v0.0.$(cat index/index.version)" >> $GITHUB_OUTPUT
      - name: Run gh attestation verify
        env:
          GH_TOKEN: ${{github.token}}
          TAG: ${{steps.git_fetch.outputs.TAG}}
          SUMS: ${{needs.release-pki.outputs.SUMS}}
          SIGN: ${{needs.release-pki.outputs.SIGNER}}
          SIGNER: ${{inputs.RUN_REF || '6329394417460630b845ac97a38efd6d1167a3c9'}} # v0.0.279
          SIGNER_WF: 0mniteck/.pki/.github/workflows/immutable.yml
        timeout-minutes: 10
        run: |
          for I in .github/{actions/jekyll,workflows}/* registry/* index/index.* local.sh ; do
            gh attestation verify $I --repo ${{github.repository}} --source-ref ${{github.ref}} \
              --signer-workflow ${{env.SIGNER_WF}} --digest-alg sha512 \
              --signer-digest ${{env.SIGNER}} --predicate-type provenance \
              --deny-self-hosted-runners -L 1 || exit 1;
            echo "$I Attested";
          done; echo Done checking provenance;
          
          gh release verify ${{env.TAG}} || exit 1; mkdir -p attestations/
          echo Done checking release by tag;
          gh release download ${{env.TAG}} -p '*.json' -p '*.log' -p '*.state' -p '*.sums' -D attestations
          
          for J in $(echo -en ${{env.SUMS}} | sed 's/\\//g'); do
            gh release verify-asset ${{env.TAG}} attestations/$J || exit 1;
            echo "$J Attested";  
          done; echo Done checking all attestations;
  read-me:
    name: Publish readme.md
    permissions:
      id-token: write
      contents: write
    concurrency:
      group: release
    needs:
      - attested-rel
      - release-pki
    with:
      attested_url: ${{needs.release-pki.outputs.URL}}
    uses: 0mniteck/.pki/.github/workflows/read-me.yml@bc57d7378d1f5eae73ec686b926b99474c088c5e # v0.0.279
  gh-pages:
    name: Release Github Pages
    permissions: 
      id-token: write
      pages: write
      contents: read
    concurrency:
      group: release
    needs: read-me
    uses: 0mniteck/.pki/.github/workflows/gh-pages.yml@30b4438d02fc2e4ceebb05b087251fd442acf324 # v0.0.279
  sync-branch:
    name: Sync Branch ${{github.ref_name}}
    permissions:
      contents: write
    concurrency:
      group: release
    needs: gh-pages
    uses: 0mniteck/.pki/.github/workflows/sync.yml@9abc4d44732a1e08856b83184c96cd5292ba1607 # v0.0.279
